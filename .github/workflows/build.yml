name: 'CI: build'

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch: {}
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  foo:
    runs-on: ubuntu-24.04
    # push for internal branches; PR only for forks
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    steps:
      - run: echo hello world
