name: 'CI: build'

on:
  workflow_dispatch: {}
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
          - language: rust
    steps:
      - run: 'false'

  codeql-final-verdict:
    name: Final verdict
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - run: 'true'
